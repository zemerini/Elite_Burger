<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datenschutzerklärung — In Arbeit | Elite Burger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wip-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-accent);
            border-radius: var(--radius-lg);
            padding: 50px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .wip-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .wip-gear {
            width: 80px;
            height: 80px;
            color: var(--accent);
            margin: 0 auto 30px auto;
            animation: spin-gear-page 6s linear infinite;
        }

        @keyframes spin-gear-page {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .wip-card h1 {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .wip-card h2 {
            font-family: var(--font-heading);
            color: var(--accent);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 24px;
        }

        .wip-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-wip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 2rem;
            background: var(--accent);
            color: var(--bg-primary);
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-wip:hover {
            transform: translateY(-2px);
            background: var(--accent-hover);
            box-shadow: 0 0 30px var(--accent-glow-strong);
        }
    </style>
</head>
<body>
    <div class="wip-card">
        <svg class="wip-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

        </svg>
        <h1>Datenschutz</h1>
        <h2>In Arbeit</h2>
        <p>Unsere Datenschutzerklärung wird derzeit aktualisiert, um dem neuesten Stand der DSGVO zu entsprechen. Diese Seite steht Ihnen in Kürze zur Verfügung.</p>
        <a href="index.html" class="btn-wip">Zurück zur Startseite</a>
    </div>
</body>
</html>
